# =============================================================================
# Vanilla S2G — Fine-tuning Configuration (PLACEHOLDER)
# =============================================================================
# Inherits structure from the dataclass schema in scripts/config_utils.py.
# Will be finalised after pre-training is complete.  Key differences from
# pretrain.yaml:
#   - Static SSI: all schema types included in every instance (budget mode).
#   - Typed SEL: optional, per dataset.
#   - Early stopping on average of strict and boundary F1.
# =============================================================================

model:
  name: google/flan-t5-small
  pretrained_checkpoint: null       # Path to best pre-trained checkpoint

tokenization:
  max_source_length: 300
  max_target_length: 150

optimizer:
  lr: 5.0e-5                        # May be lowered after tuning
  weight_decay: 0.0
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8

scheduler:
  type: inverse_sqrt
  warmup_steps: 1000

train:
  max_steps: 1000000                # Will be dataset-dependent
  batch_size: 4
  gradient_acc_steps: 8
  gradient_clip_value: 10.0
  precision: '16'                   # Quoted: schema declares this as a string
  seed: 0

validation:
  check_interval: 10000
  percent_check: 0.2
  batch_size: 32
  early_stopping_patience: 10
  early_stopping_metric: val_avg_f1   # Average of strict and boundary F1

generation:
  num_beams: 3
  length_penalty: 0.0
  no_repeat_ngram_size: 0
  early_stopping: false
  constraint_decoding: false        # Unconstrained during fine-tuning

ssi:                                # Budget-limited during fine-tuning
  positive_rate: 1.0                # Include all gold types
  negative_rate: 1.0                # Include all sampled negatives
  negative_max_start: 10            # Not used in budget mode (kept for collator API)
  negative_max_end: 10              # Not used in budget mode
  max_types_in_prompt: 10           # Total = gold positives + sampled negatives
  random_prompt: false
  random_sel: false

typed_sel:                          # Typed SEL generation
  enabled: false                    # Enable for datasets with entity-type annotations
  entity_types: []                  # Populated per dataset

checkpoint:
  save_top_k: 3
  metric: val_avg_f1
  mode: max
  save_last: true
  every_n_steps: 5000
  resume_from: null

callbacks:
  sample_generation_interval: 50000

wandb:
  project: ddp-vanilla-s2g
  entity: null
  run_name: null

data:
  data_dir: null                    # e.g. data/conll04, data/nyt_multi, data/scierc
  schema_file: null
  output_dir: outputs/finetune

hardware:
  num_workers: 4
  gpu_ids: null