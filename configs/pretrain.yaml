# =============================================================================
# Vanilla S2G — Pre-training Configuration
# =============================================================================
# Every field here is validated against the dataclass schema in
# scripts/config_utils.py.  Override any nested field from the command line
# using OmegaConf dotlist syntax (key=value, dotted for nested keys):
#
#   python -m vanilla_s2g.scripts.pretrain --config configs/pretrain.yaml \
#       optimizer.lr=3e-5 train.batch_size=8
#
# For W&B sweeps, the agent injects overrides automatically via
# ${args_no_hyphens}.  Dotted keys in the sweep `parameters` block (e.g.
# `optimizer.lr`) map directly onto these nested config fields.
# =============================================================================

model:
  name: google/flan-t5-small        # Pre-trained Flan-T5 variant (60M params)

tokenization:
  max_source_length: 300            # Encoder input budget (SSI + text)
  max_target_length: 150            # Decoder target budget (SEL)

optimizer:                          # AdamW
  lr: 1e-4
  weight_decay: 0.0                 # Following REBEL
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8

scheduler:
  type: cosine
  warmup_steps: 25000               # Linear warmup from 0 → lr

train:
  max_steps: 250000
  batch_size: 16                    # Per-device train batch size
  gradient_acc_steps: 2             # Effective batch: 16 × 2 = 32
  gradient_clip_value: 10.0
  precision: bf16                   # "16" / "bf16" / "32"
  seed: 0                           # Determines init, data shuffle, SSI sampling

validation:
  check_interval: 6125              # Validate every N training steps
  percent_check: 0.1                # Fraction of val set used per check
  batch_size: 32                    # May exceed train batch size
  early_stopping_patience: 12       # In validation checks, not steps
  early_stopping_metric: val_f1

generation:                         # Beam search at validation
  num_beams: 3
  length_penalty: 0.0               # No bias toward long sequences
  no_repeat_ngram_size: 0           # Same span may recur legitimately
  early_stopping: false             # Do not truncate triplets prematurely
  constraint_decoding: false        # Disabled during pre-training

ssi:                                # Schema-Sensitive-Input dynamic construction
  positive_rate: 0.9                # Bernoulli prob. for each positive type
  negative_rate: 0.1                # Bernoulli prob. for each sampled negative
  negative_max_start: 1             # k(0): max negatives at training start
  negative_max_end: 10              # k(T): max negatives at training end
  max_types_in_prompt: null         # null = use k(t) schedule
  random_prompt: false              # Shuffle SSI type order
  random_sel: false                 # Shuffle SEL entity / relation order

checkpoint:
  save_top_k: 3                     # Keep top-k by `metric` below
  metric: val_f1
  mode: max                         # Higher is better for F1
  save_last: true                   # Always keep the latest
  every_n_steps: 500                # Resumable safety-net checkpoints
  resume_from: null                 # Path to checkpoint dir; null = fresh start

callbacks:
  sample_generation_interval: 12250   # Log gold vs. predicted triplets every N

wandb:
  project: ddp-vanilla-s2g
  entity: null                      # Your W&B team / username (or null)
  run_name: pretrain-small-laptop   # Auto-generated if null

data:
  data_dir: data/rebel              # Train / val / test JSONL files
  schema_file: data/rebel/relation.schema   # One relation type per line
  output_dir: outputs/pretrain      # Checkpoints, logs, predictions

hardware:
  num_workers: 0                    # DataLoader workers PER GPU
  gpu_ids: null                     # null = all available; e.g. [0, 1, 7]